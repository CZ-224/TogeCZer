# Generate the Xcode project on a Mac with:  brew install xcodegen && cd ios && xcodegen
name: Together
options:
  bundleIdPrefix: cz
  deploymentTarget:
    iOS: "17.0"
  usesTabs: false
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.6.0
targets:
  Together:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Together
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
          - "GoogleService-Info.plist"
          - "Assets.xcassets"
          - "Together.entitlements"
    resources:
      - Together/GoogleService-Info.plist
      - Together/Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: Together
        PRODUCT_BUNDLE_IDENTIFIER: cz-app
        INFOPLIST_FILE: Together/Info.plist
        CODE_SIGN_ENTITLEMENTS: Together/Together.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
    dependencies:
      - package: Firebase
        products:
          - FirebaseAuth
          - FirebaseCore
          - FirebaseFirestore
          - FirebaseMessaging
